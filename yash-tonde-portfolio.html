<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaCart — E-Commerce App</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2f;
      --card: #1a2340;
      --text: #f4f7ff;
      --muted: #a8b1cc;
      --accent: #6c7dff;
      --accent-2: #50d6ff;
      --ok: #24c77d;
      --danger: #ff5a7a;
      --border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(140deg, #090d1a, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      width: min(1150px, 95vw);
      margin: 2rem auto;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.25rem;
    }

    .panel {
      background: rgba(19, 26, 47, 0.85);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1rem;
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    h1 { font-size: clamp(1.4rem, 2vw, 2rem); }
    .brand { color: var(--accent-2); }

    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    button, select, input {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 10px;
      padding: 0.6rem 0.75rem;
      font-size: 0.92rem;
    }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }

    .search { min-width: 220px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.9rem;
    }

    .product {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .product img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #232e52;
    }

    .product-content { padding: 0.75rem; display: grid; gap: 0.5rem; }
    .product h3 { font-size: 0.98rem; }
    .meta { color: var(--muted); font-size: 0.84rem; }
    .price { font-weight: 700; color: var(--accent-2); }

    .add {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      font-weight: 600;
      color: #041122;
    }

    .cart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
    }

    .cart-list { display: grid; gap: 0.6rem; max-height: 460px; overflow: auto; }

    .cart-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.65rem;
      display: grid;
      gap: 0.35rem;
    }

    .row { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .qty-controls { display: flex; gap: 0.4rem; }
    .qty-controls button { padding: 0.3rem 0.5rem; }

    .empty { color: var(--muted); text-align: center; padding: 1rem; }
    .total { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
    .checkout {
      width: 100%;
      margin-top: 0.75rem;
      background: var(--ok);
      color: #032113;
      border: none;
      font-weight: 700;
    }

    .tag {
      font-size: 0.75rem;
      color: #0a1a32;
      background: #c8ecff;
      border-radius: 999px;
      padding: 0.2rem 0.5rem;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="topbar">
        <h1><span class="brand">NovaCart</span> E-Commerce</h1>
        <input id="searchInput" class="search" type="search" placeholder="Search products..." />
      </div>

      <div class="topbar">
        <div class="filters">
          <select id="categoryFilter">
            <option value="all">All Categories</option>
          </select>
          <select id="sortFilter">
            <option value="featured">Sort: Featured</option>
            <option value="priceLow">Price: Low to High</option>
            <option value="priceHigh">Price: High to Low</option>
            <option value="rating">Rating</option>
          </select>
        </div>
        <span class="meta" id="countLabel"></span>
      </div>

      <div id="productGrid" class="grid"></div>
    </section>

    <aside class="panel">
      <div class="cart-head">
        <h2>🛒 Cart</h2>
        <span class="tag" id="cartCount">0 items</span>
      </div>
      <div id="cartList" class="cart-list"></div>
      <div class="total">
        <div class="row"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
        <div class="row"><span>Shipping</span><strong id="shipping">$0.00</strong></div>
        <div class="row"><span>Total</span><strong id="total">$0.00</strong></div>
        <button class="checkout" id="checkoutBtn">Checkout</button>
      </div>
    </aside>
  </main>

  <script>
    const products = [
      { id: 1, name: 'Wireless Earbuds', category: 'Electronics', price: 49.99, rating: 4.5, image: 'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=600&q=80' },
      { id: 2, name: 'Smart Fitness Watch', category: 'Electronics', price: 89.00, rating: 4.3, image: 'https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600&q=80' },
      { id: 3, name: 'Minimal Sneakers', category: 'Fashion', price: 75.00, rating: 4.7, image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80' },
      { id: 4, name: 'Leather Backpack', category: 'Fashion', price: 64.50, rating: 4.4, image: 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600&q=80' },
      { id: 5, name: 'Ceramic Coffee Set', category: 'Home', price: 34.99, rating: 4.6, image: 'https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=600&q=80' },
      { id: 6, name: 'Desk Lamp', category: 'Home', price: 29.99, rating: 4.1, image: 'https://images.unsplash.com/photo-1534073828943-f801091bb18c?w=600&q=80' }
    ];

    const cart = new Map();
    const productGrid = document.getElementById('productGrid');
    const cartList = document.getElementById('cartList');
    const cartCount = document.getElementById('cartCount');
    const subtotalEl = document.getElementById('subtotal');
    const shippingEl = document.getElementById('shipping');
    const totalEl = document.getElementById('total');
    const countLabel = document.getElementById('countLabel');
    const categoryFilter = document.getElementById('categoryFilter');
    const sortFilter = document.getElementById('sortFilter');
    const searchInput = document.getElementById('searchInput');

    function currency(n) { return `$${n.toFixed(2)}`; }

    function initCategories() {
      [...new Set(products.map(p => p.category))].forEach(c => {
        const option = document.createElement('option');
        option.value = c;
        option.textContent = c;
        categoryFilter.appendChild(option);
      });
    }

    function getVisibleProducts() {
      const query = searchInput.value.trim().toLowerCase();
      const category = categoryFilter.value;
      const sortBy = sortFilter.value;

      let list = products.filter(p => {
        const categoryMatch = category === 'all' || p.category === category;
        const searchMatch = p.name.toLowerCase().includes(query);
        return categoryMatch && searchMatch;
      });

      if (sortBy === 'priceLow') list.sort((a, b) => a.price - b.price);
      if (sortBy === 'priceHigh') list.sort((a, b) => b.price - a.price);
      if (sortBy === 'rating') list.sort((a, b) => b.rating - a.rating);

      return list;
    }

    function renderProducts() {
      const list = getVisibleProducts();
      countLabel.textContent = `${list.length} products found`;
      productGrid.innerHTML = list.map(p => `
        <article class="product">
          <img src="${p.image}" alt="${p.name}" loading="lazy" />
          <div class="product-content">
            <h3>${p.name}</h3>
            <div class="row"><span class="meta">${p.category}</span><span class="meta">⭐ ${p.rating}</span></div>
            <div class="row">
              <span class="price">${currency(p.price)}</span>
              <button class="add" onclick="addToCart(${p.id})">Add</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    function addToCart(id) {
      cart.set(id, (cart.get(id) || 0) + 1);
      renderCart();
    }

    function updateQty(id, delta) {
      const next = (cart.get(id) || 0) + delta;
      if (next <= 0) cart.delete(id);
      else cart.set(id, next);
      renderCart();
    }

    function renderCart() {
      const entries = [...cart.entries()];
      const count = entries.reduce((sum, [, qty]) => sum + qty, 0);

      cartCount.textContent = `${count} item${count === 1 ? '' : 's'}`;

      if (!entries.length) {
        cartList.innerHTML = '<p class="empty">Your cart is empty.</p>';
      } else {
        cartList.innerHTML = entries.map(([id, qty]) => {
          const p = products.find(x => x.id === id);
          return `
            <div class="cart-item">
              <div class="row"><strong>${p.name}</strong><span>${currency(p.price * qty)}</span></div>
              <div class="row">
                <span class="meta">${currency(p.price)} each</span>
                <div class="qty-controls">
                  <button onclick="updateQty(${id}, -1)">−</button>
                  <span>${qty}</span>
                  <button onclick="updateQty(${id}, 1)">+</button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      }

      const subtotal = entries.reduce((sum, [id, qty]) => {
        const p = products.find(x => x.id === id);
        return sum + p.price * qty;
      }, 0);

      const shipping = subtotal > 0 && subtotal < 80 ? 6.99 : 0;
      const total = subtotal + shipping;

      subtotalEl.textContent = currency(subtotal);
      shippingEl.textContent = currency(shipping);
      totalEl.textContent = currency(total);
    }

    document.getElementById('checkoutBtn').addEventListener('click', () => {
      if (!cart.size) return alert('Add some products before checkout.');
      alert('Checkout complete! (Demo only)');
      cart.clear();
      renderCart();
    });

    [categoryFilter, sortFilter].forEach(el => el.addEventListener('change', renderProducts));
    searchInput.addEventListener('input', renderProducts);

    initCategories();
    renderProducts();
    renderCart();
  </script>
</body>
</html>
