<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaCart | E-commerce Demo App</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --muted: #94a3b8;
      --text: #f8fafc;
      --accent: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: linear-gradient(180deg, #020617, var(--bg));
      color: var(--text);
    }
    header {
      padding: 24px;
      position: sticky;
      top: 0;
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #334155;
      z-index: 10;
    }
    h1 { margin: 0 0 8px; }
    .sub { color: var(--muted); margin: 0; }
    main {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .price { color: #86efac; font-weight: 600; }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 10px;
      font-weight: 700;
      margin-top: 10px;
      cursor: pointer;
    }
    .add { background: var(--accent); color: #052e16; }
    .cart {
      background: var(--panel);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      height: fit-content;
      position: sticky;
      top: 110px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #334155;
    }
    .remove {
      background: var(--danger);
      color: white;
      width: auto;
      padding: 6px 8px;
      margin: 0;
    }
    .summary { margin-top: 12px; }
    .checkout { background: #38bdf8; color: #082f49; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .cart { position: static; }
    }
  </style>
</head>
<body>
  <header>
    <h1>NovaCart</h1>
    <p class="sub">A simple E-commerce app with product catalog and live cart.</p>
  </header>

  <main>
    <section>
      <h2>Products</h2>
      <div id="products" class="products"></div>
    </section>

    <aside class="cart">
      <h2>Your Cart</h2>
      <div id="cartItems"></div>
      <div class="summary">
        <p>Items: <strong id="itemCount">0</strong></p>
        <p>Total: <strong id="totalPrice">$0.00</strong></p>
      </div>
      <button class="checkout" onclick="checkout()">Checkout</button>
    </aside>
  </main>

  <script>
    const products = [
      { id: 1, name: 'Wireless Headphones', price: 79.99, description: 'Noise-cancelling over-ear headphones.' },
      { id: 2, name: 'Smart Watch', price: 129.99, description: 'Fitness tracking and notifications.' },
      { id: 3, name: 'Mechanical Keyboard', price: 94.50, description: 'RGB backlit keyboard with tactile switches.' },
      { id: 4, name: 'Portable SSD 1TB', price: 109.00, description: 'High-speed external SSD for creators.' },
      { id: 5, name: 'USB-C Hub', price: 34.99, description: '7-in-1 adapter with HDMI and card reader.' },
      { id: 6, name: 'Gaming Mouse', price: 44.90, description: 'Lightweight mouse with precision sensor.' }
    ];

    const cart = [];

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = products.map(product => `
        <article class="card">
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <p class="price">$${product.price.toFixed(2)}</p>
          <button class="add" onclick="addToCart(${product.id})">Add to Cart</button>
        </article>
      `).join('');
    }

    function addToCart(id) {
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        const product = products.find(p => p.id === id);
        cart.push({ ...product, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      const idx = cart.findIndex(item => item.id === id);
      if (idx >= 0) {
        if (cart[idx].qty > 1) {
          cart[idx].qty -= 1;
        } else {
          cart.splice(idx, 1);
        }
      }
      renderCart();
    }

    function renderCart() {
      const cartItems = document.getElementById('cartItems');
      if (!cart.length) {
        cartItems.innerHTML = '<p class="sub">Your cart is empty.</p>';
      } else {
        cartItems.innerHTML = cart.map(item => `
          <div class="cart-item">
            <div>
              <strong>${item.name}</strong><br />
              <small>$${item.price.toFixed(2)} × ${item.qty}</small>
            </div>
            <button class="remove" onclick="removeFromCart(${item.id})">−</button>
          </div>
        `).join('');
      }

      const itemCount = cart.reduce((acc, item) => acc + item.qty, 0);
      const total = cart.reduce((acc, item) => acc + item.price * item.qty, 0);
      document.getElementById('itemCount').textContent = itemCount;
      document.getElementById('totalPrice').textContent = `$${total.toFixed(2)}`;
    }

    function checkout() {
      if (!cart.length) {
        alert('Your cart is empty. Add products first.');
        return;
      }
      alert('Order placed successfully! (Demo)');
      cart.length = 0;
      renderCart();
    }

    renderProducts();
    renderCart();
  </script>
</body>
</html>
